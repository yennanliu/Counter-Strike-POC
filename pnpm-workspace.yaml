packages:
  - "packages/*"

# esbuild needs its native binary (vitest); build it.
onlyBuiltDependencies:
  - esbuild

# msgpackr-extract is an optional native accel for msgpackr (Colyseus); the pure-JS
# fallback is fine, so don't build it.
ignoredBuiltDependencies:
  - msgpackr-extract

allowBuilds:
  esbuild: set this to true or false
