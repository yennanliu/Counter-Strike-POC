packages:
  - "packages/*"

# Build-script approvals. Standard pnpm reads onlyBuiltDependencies/
# ignoredBuiltDependencies; this environment's pnpm reads allowBuilds. We set both
# so esbuild (needed by vitest/tsx) builds and msgpackr-extract is skipped (its
# pure-JS fallback is fine). CI installs with --ignore-scripts + an explicit
# `pnpm rebuild esbuild`, so it doesn't depend on either being honored.
onlyBuiltDependencies:
  - esbuild
ignoredBuiltDependencies:
  - msgpackr-extract
allowBuilds:
  esbuild: true
  msgpackr-extract: false
