<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter-Strike POC</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #111; font-family: ui-monospace, monospace; color: #eee; }
      #game { display: block; width: 100vw; height: 100vh; }
      #crosshair { position: fixed; left: 50%; top: 50%; width: 6px; height: 6px; margin: -3px 0 0 -3px; background: #fff; border-radius: 50%; pointer-events: none; opacity: .8; }
      #hud { position: fixed; inset: 0; pointer-events: none; padding: 12px; }
      #status { font-size: 14px; text-shadow: 0 1px 2px #000; }
      #hp { position: fixed; left: 12px; bottom: 12px; font-size: 28px; font-weight: bold; text-shadow: 0 1px 2px #000; }
      #scoreboard { position: fixed; right: 12px; top: 12px; font-size: 13px; text-align: right; line-height: 1.5; text-shadow: 0 1px 2px #000; }
      #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.6); pointer-events: auto; }
      #overlay .card { background: #1b1b1b; border: 1px solid #333; padding: 24px 28px; border-radius: 10px; text-align: center; }
      #overlay h1 { font-size: 20px; margin-bottom: 6px; }
      #overlay p { font-size: 13px; color: #aaa; margin-bottom: 16px; }
      #overlay button { font: inherit; padding: 8px 18px; background: #3b82f6; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
      #overlay button:disabled { opacity: .6; cursor: default; }
      #error { margin-top: 16px; font-size: 11px; color: #cbd5e1; line-height: 1.5; max-width: 420px; max-height: 200px; overflow-y: auto; text-align: left; white-space: pre-wrap; background:#0d0d0d; border:1px solid #2a2a2a; border-radius:6px; padding: 8px; }
      #error:empty { display: none; }
      select { font: inherit; margin: 0 6px; padding: 4px; background:#222; color:#eee; border:1px solid #444; border-radius:4px;}
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="crosshair" hidden></div>
    <div id="hud" hidden>
      <div id="status"></div>
      <div id="hp"></div>
      <div id="scoreboard"></div>
    </div>
    <div id="overlay">
      <div class="card">
        <h1>Counter-Strike POC</h1>
        <p>Pick a field, then click the canvas to lock the mouse. WASD to move, mouse to aim, click to shoot.</p>
        <label>Field
          <select id="map">
            <option value="arena">Arena</option>
            <option value="dust-lite">Dust Lite</option>
            <option value="warehouse">Warehouse</option>
            <option value="office">Office</option>
            <option value="bridge">Bridge</option>
          </select>
        </label>
        <br /><br />
        <button id="play">Join match</button>
        <div id="error"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
