name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Game packages: typecheck + unit/integration tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # Verify the ECS server image actually builds (proves Dockerfile.server works).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: false
          load: true
          tags: cs-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # AWS CDK infra: install, compile, unit tests, and synth (syntax check).
  cdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs-infra-stack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cs-infra-stack/package-lock.json

      - run: npm ci
      - run: npm run build # tsc compile
      - run: npm test # CDK assertion tests
      - run: npx cdk synth # synthesizes CloudFormation (no AWS creds needed)
