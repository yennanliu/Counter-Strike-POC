name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Game packages: typecheck + unit/integration tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install without build scripts (pnpm's build-approval gate fails a fresh
      # install on esbuild/msgpackr-extract), then build just esbuild for vitest.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm rebuild esbuild
      - run: pnpm typecheck
      - run: pnpm test

  # Build the ECS server image (proves Dockerfile.server works). On a push to main,
  # also publish it to Docker Hub IF DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are
  # set — we publish to a public registry, NOT ECR. CDK pulls it via
  # `-c serverImage=docker.io/<user>/cs-server:latest`.
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub (if configured)
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Build (and push to Docker Hub when configured on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: ${{ env.DOCKERHUB_TOKEN != '' && github.event_name == 'push' }}
          load: ${{ env.DOCKERHUB_TOKEN == '' }}
          tags: ${{ env.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/cs-server:latest', env.DOCKERHUB_USERNAME) || 'cs-server:ci' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # AWS CDK infra: install, compile, unit tests, and synth (syntax check).
  cdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs-infra-stack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cs-infra-stack/package-lock.json

      - run: npm ci
      - run: npm run build # tsc compile
      - run: npm test # CDK assertion tests
      - run: npx cdk synth # synthesizes CloudFormation (no AWS creds needed)
